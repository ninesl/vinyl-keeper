server {
    listen 80;
    listen [::]:80;
    server_name ninescoding.com www.ninescoding.com;

    # Allow ACME HTTP-01 challenge for certificate renewals.
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name ninescoding.com www.ninescoding.com;

    ssl_certificate /etc/letsencrypt/live/ninescoding.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ninescoding.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
