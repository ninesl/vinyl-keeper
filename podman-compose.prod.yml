name: vinyl-keeper-prod

services:
  app:
    image: vinyl-keeper:app
    environment:
      DB_PATH: /data/vinylkeeper.db
      IMAGE_SERVICE_HOST: image-service
      IMAGE_SERVICE_PORT: "8081"
      IMAGE_SERVICE_ENDPOINT: /embed
      IMAGE_SERVICE_HEALTH_ENDPOINT: ${IMAGE_SERVICE_HEALTH_ENDPOINT:-/health}
      IMAGE_SERVICE_WAIT_RETRIES: "${IMAGE_SERVICE_WAIT_RETRIES:-60}"
      IMAGE_SERVICE_WAIT_SECONDS: "${IMAGE_SERVICE_WAIT_SECONDS:-1}"
      ENABLE_TLS: "false"
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - /srv/vinyl-keeper/data:/data
    depends_on:
      - image-service
    restart: unless-stopped

  image-service:
    image: vinyl-keeper:image-service
    command: ["uv", "run", "uvicorn", "image_service:app", "--host", "0.0.0.0", "--port", "8081"]
    environment:
      EMBED_MODEL_PATH: /models/ViT-B-32__openai/visual/model.onnx
      EMBED_MODEL_FAMILY: clip
      EMBED_DIM: "512"
      EMBED_IMAGE_SIZE: "224"
    volumes:
      - /srv/vinyl-keeper/models:/models:ro
    restart: unless-stopped
