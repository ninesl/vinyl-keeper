services:
  app:
    build:
      context: .
    environment:
      DB_PATH: /data/vinylkeeper.db
      IMAGE_SERVICE_HOST: image-service
      IMAGE_SERVICE_PORT: "8000"
      IMAGE_SERVICE_ENDPOINT: /embed
      TLS_CERT: /app/certs/dev.crt
      TLS_KEY: /app/certs/dev.key
    ports:
      - "443:8080"
    volumes:
      - app-data:/data
      - ./certs:/app/certs:ro
    depends_on:
      image-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --quiet --no-check-certificate https://localhost:8080/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s

  image-service:
    build:
      context: ./image_service
    environment:
      EMBED_MODEL_PATH: models/clip-vit-b-32.onnx
      EMBED_MODEL_FAMILY: clip
      EMBED_DIM: "512"
      EMBED_IMAGE_SIZE: "224"
    expose:
      - "8000"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider --quiet http://localhost:8000/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 10s

volumes:
  app-data:
