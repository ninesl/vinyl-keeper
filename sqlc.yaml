version: "2"
sql:
  - engine: "sqlite"
    queries: "query.sql"
    schema: "schema.sql"
    gen:
      go:
        package: "vinyl"
        out: "vinyl"
        emit_prepared_queries: true
        emit_empty_slices: true
        emit_db_tags: true
        emit_pointers_for_null_types: true
        # emit_json_tags: true
        # json_tags_case_style: "camel"
