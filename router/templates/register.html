<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register Vinyl</title>
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js"></script>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header>
    <h1>Register New Vinyl</h1>
  </header>

  <nav class="nav">
    <a href="/scanner">Scanner</a>
    <a href="/albums">All Albums</a>
    <a href="/register">Register</a>
  </nav>

  <div class="register-form">
    <form hx-get="/register/submit" 
          hx-target="#results" 
          hx-swap="afterbegin"
          hx-indicator="#loading">
      <div class="form-group">
        <label for="artist">Artist</label>
        <input type="text" id="artist" name="artist" placeholder="e.g., Death" required>
      </div>
      <div class="form-group">
        <label for="album">Album</label>
        <input type="text" id="album" name="album" placeholder="e.g., Symbolic" required>
      </div>
      <button type="submit">
        Register Vinyl <span id="loading" class="htmx-indicator">...</span>
      </button>
    </form>
  </div>

  <div id="results" class="albums-grid"></div>
</body>
</html>
